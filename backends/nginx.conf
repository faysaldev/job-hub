# Nginx Server block configuration for Job-Hub Backend
# Put this in /etc/nginx/sites-available/job-hub-backend and symlink it to sites-enabled

upstream backend_server {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name api.your-domain.com; # Replace with your actual domain or subdomain

    # Redirect all HTTP requests to HTTPS (comment out during initial setup if not using SSL yet)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://backend_server;
        proxy_http_version 1.1;

        # WebSocket support (critical for Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for websocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
