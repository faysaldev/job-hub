services:
  app:
    build:
      context: .
      target: production
    container_name: job_hub_backend
    restart: always
    expose:
      - "3001"           # internal only — Caddy proxies external traffic
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - BACKEND_IP=0.0.0.0
      - PORT=3001
      # Redis points to the sibling container
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      # Frontend URL for CORS (set here as well so docker-compose overrides local .env)
      - FRONTEND_URL=https://job-hubs.vercel.app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: job_hub_redis
    restart: always
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  caddy:
    image: caddy:2-alpine
    container_name: job_hub_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"   # kept open for future domain/TLS upgrade
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - app
    networks:
      - app_network

volumes:
  redis_data:
  caddy_data:
  caddy_config:
  caddy_logs:

networks:
  app_network:
    driver: bridge
