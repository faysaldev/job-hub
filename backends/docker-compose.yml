services:
  app:
    build:
      context: .
      target: production
    container_name: job_hub_backend
    restart: always
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - BACKEND_IP=0.0.0.0
    depends_on:
      - redis
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: job_hub_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app_network

caddy:
  image: caddy:2-alpine
  container_name: job_hub_caddy
  restart: always
  ports:
    - "80:80"
    - "443:443"
  volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile
    - caddy_data:/data
    - caddy_config:/config
  depends_on:
    - app
  networks:
    - app_network

volumes:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  app_network:
    driver: bridge
